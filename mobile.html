        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 15px 10px; line-height: 1.5; font-size: 14px; }
        
        header { margin-bottom: 20px; text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        header h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 5px; }
        header p { color: var(--text-muted); font-size: 0.8rem; }

        /* 모바일용 메인 레이아웃 (1단 세로 배치) */
        .section-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; font-weight: bold; }
        .section-title.red { color: #f43f5e; border-color: #f43f5e; }
        .section-title.green { color: #10b981; border-color: #10b981; }
        .section-title.yellow { color: var(--favorite); border-color: var(--favorite); }

        /* 모바일 매트릭스 리스트 */
        .matrix-grid { display: flex; flex-direction: column; gap: 10px; }

        .cell-header { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; }
        .cell-header span:last-child { font-size: 0.75rem; color: var(--text-muted); }
        
        .stock-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .stock-item { font-size: 0.9rem; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .stock-item:active { background: var(--border-color); }
        .stock-change { font-weight: bold; }

        .ma-list, .journal-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .ma-badges { display: flex; gap: 4px; margin-top: 4px; }
        .badge { font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; color: #fff; }
