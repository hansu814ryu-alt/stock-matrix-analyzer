name: Daily Stock Data Update

on:
  schedule:
    # 한국 시간(KST) 매일 오후 17:00 (세계 표준시 UTC 기준 오전 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # 주말이나 낮에 내가 원할 때 수동으로도 켤 수 있게 하는 버튼입니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 도구 설치하기
      run: |
        pip install pandas finance-datareader pykrx

    - name: 주식 분석 프로그램 실행하기
      run: |
        python update_stock.py

    - name: 계산된 결과 데이터를 저장소에 업데이트하기
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 1. 오늘 새로 생성된 임시 데이터 파일들을 잠시 임시 보관함에 보관합니다.
        git stash
        
        # 2. 원격 저장소의 최신 파일(main.yml 등)을 안전하게 가져옵니다.
        git pull --rebase origin main
        
        # 3. 임시 보관함에 넣어둔 오늘 데이터 파일들을 다시 꺼내옵니다.
        git stash pop || echo "가져올 임시 데이터 없음"
        
        # 4. 이제 안전하게 하나로 합쳐진 데이터를 저장소에 기록합니다.
        git add .
        git commit -m "오후 17시 주도주 매트릭스 및 트래킹 데이터 업데이트 완료" || echo "변경사항 없음"
        git push
