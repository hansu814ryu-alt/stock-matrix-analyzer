<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주도주 트래킹 하이브리드 대시보드</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent: #38bdf8;
            --r4: #ef4444; --r3: #f97316; --r2: #f59e0b; --r1: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.5; }
        header { margin-bottom: 25px; text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        header h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 5px; }
        header p { color: var(--text-muted); font-size: 0.9rem; }

        /* 메인 레이아웃 */
        .main-container { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-bottom: 25px; }

        /* 4x4 매트릭스 스타일 */
        .matrix-wrapper { display: flex; flex-direction: column; }
        /* [요구사항 2] 직관적 열 라벨 */
        .grid-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px; text-align: center; font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-grow: 1; }
        .matrix-cell { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; min-height: 150px; display: flex; flex-direction: column; }
        .cell-header { font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; }
        
        /* 공통 종목 아이템 스타일 */
        .stock-list { list-style: none; overflow-y: auto; max-height: 140px; }
        .stock-item { font-size: 0.85rem; padding: 6px 8px; margin-bottom: 4px; background: rgba(255,255,255,0.03); border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .stock-item:hover { background: var(--border-color); color: var(--accent); transform: translateX(2px); }
        .stock-change { font-weight: bold; }

        /* 이평선 돌파 종목 섹션 */
        .ma-board { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        .ma-board h2 { font-size: 1.1rem; margin-bottom: 15px; color: #f43f5e; border-bottom: 2px solid #f43f5e; padding-bottom: 5px; }
        .ma-list { list-style: none; overflow-y: auto; max-height: 580px; }
        .ma-badges { display: flex; gap: 4px; }
        .badge { font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; color: #fff; }
        .bg-ma5 { background-color: #3b82f6; }
        .bg-ma20 { background-color: #eab308; }
        .bg-ma60 { background-color: #a855f7; }

        /* 하단 카운트 랭킹 보드 */
        .ranking-section { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .ranking-section h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        .ranking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .ranking-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-card:hover { border-color: var(--accent); background: var(--border-color); }
        .rank-info { display: flex; flex-direction: column; }
        .rank-name { font-size: 0.85rem; font-weight: bold; }
        .rank-code { font-size: 0.75rem; color: var(--text-muted); }
        .rank-count { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        /* [요구사항 4] 매매일지 섹션 스타일 */
        .journal-section { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .journal-section h2 { font-size: 1.2rem; margin-bottom: 15px; color: #10b981; border-bottom: 2px solid #10b981; padding-bottom: 5px; }
        .journal-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .journal-form { display: flex; flex-direction: column; gap: 10px; }
        .journal-form input, .journal-form textarea { background: #0f172a; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; color: #fff; font-size: 0.9rem; }
        .journal-form textarea { resize: none; height: 120px; }
        .journal-form button { background: #10b981; color: #fff; border: none; border-radius: 6px; padding: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .journal-form button:hover { background: #059669; }
        .journal-list { list-style: none; overflow-y: auto; max-height: 280px; display: flex; flex-direction: column; gap: 10px; }
        .journal-item { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; position: relative; }
        .journal-item-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; border-bottom: 1px dashed var(--border-color); padding-bottom: 4px; }
        .journal-item-title { font-weight: bold; color: #fff; margin-bottom: 4px; font-size: 0.95rem; }
        .journal-item-content { font-size: 0.85rem; color: #cbd5e1; white-space: pre-line; }
        .journal-del-btn { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.8rem; }

        /* 팝업 모달창 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 12px; padding: 25px; width: 360px; text-align: center; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; }
        .modal-title { font-size: 1.3rem; margin-bottom: 15px; color: var(--accent); font-weight: bold; }
        .modal-info-box { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 12px; text-align: left; margin-bottom: 10px; font-size: 0.9rem; }
        .modal-info-box span { color: var(--text-muted); }
        .modal-info-box strong { float: right; color: #fff; }

        /* 행별 상단 라벨 장식 색상 */
        .r4-cell { border-top: 3px solid var(--r4); } .r3-cell { border-top: 3px solid var(--r3); }
        .r2-cell { border-top: 3px solid var(--r2); } .r1-cell { border-top: 3px solid var(--r1); }

        @media (max-width: 1024px) {
            .main-container, .journal-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>주도주 트래킹 하이브리드 대시보드</h1>
        <p>전수조사 데이터 · 전일 대비 직관 필터 · 이평선 골든크로스 · 누적 스코어링 시스템</p>
    </header>

    <div class="main-container">
        <div class="matrix-wrapper">
            <div class="grid-labels">
                <div>C1 (거래량 감소)</div>
                <div>C2 (거래량 100%~150%)</div>
                <div>C3 (거래량 150%~200%)</div>
                <div>C4 (거래량 200% 이상)</div>
            </div>
            <div class="matrix-grid" id="matrixGrid">
                </div>
        </div>

        <div class="ma-board">
            <h2>중요 이평선 돌파 (오늘)</h2>
            <ul class="ma-list" id="maList">
                <li class="ma-item" style="color: var(--text-muted); text-align: center;">데이터 로드 중...</li>
            </ul>
        </div>
    </div>

    <div class="ranking-section">
        <h2>🔥 누적 포착 주도성 랭킹 (포착 빈도 높은 순)</h2>
        <div class="ranking-grid" id="rankingGrid">
            </div>
    </div>

    <div class="journal-section">
        <h2>📝 매일 매매일지 장부</h2>
        <div class="journal-container">
            <div class="journal-form">
                <input type="date" id="journalDate">
                <input type="text" id="journalTitle" placeholder="제목 (예: 2차전지 주도 섹터 매매)">
                <textarea id="journalContent" placeholder="오늘의 매매 내용, 피드백, 특이사항을 기록하세요."></textarea>
                <button onclick="saveJournal()">일지 저장하기</button>
            </div>
            <ul class="journal-list" id="journalList">
                </ul>
        </div>
    </div>

    <div class="modal" id="stockModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="mName">종목명</div>
            <div class="modal-info-box">
                <span>종목 코드</span> <strong id="mCode">000000</strong>
            </div>
            <div class="modal-info-box">
                <span>오늘 상승률</span> <strong id="mChange" style="color: #ef4444;">+0.0%</strong>
            </div>
            <div class="modal-info-box">
                <span>전일 대비 거래량</span> <strong id="mVolume">0.0%</strong>
            </div>
            <div class="modal-info-box" style="border: 1px dashed var(--accent); margin-top: 15px;">
                <span>🎯 최초 포착 날짜</span> <strong id="mFirstDate">2026-00-00</strong>
            </div>
            <div class="modal-info-box">
                <span>🎯 최초 포착 위치</span> <strong id="mFirstCell" style="color: var(--accent);">R0C0</strong>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수로 데이터 컨텍스트 캐싱 (모달 공유용)
        let globalCapturedData = {};

        // [요구사항 2] Y축 행 제목 직관적 변경
        const rowTitles = {
            4: "상승률 12% 이상",
            3: "상승률 6% ~ 12%",
            2: "상승률 3% ~ 6%",
            1: "상승률 3% 미만"
        };

        // 16개 칸 격자 레이아웃 사전 배치
        const gridContainer = document.getElementById('matrixGrid');
        for (let r = 4; r >= 1; r--) {
            for (let c = 1; c <= 4; c++) {
                const cellId = `R${r}C${c}`;
                const cell = document.createElement('div');
                cell.className = `matrix-cell r${r}-cell`;
                cell.id = cellId;
                cell.innerHTML = `
                    <div class="cell-header" style="color: var(--r${r});">
                        <span>${cellId}</span>
                        <span>${rowTitles[r]}</span>
                    </div>
                    <ul class="stock-list" id="list-${cellId}"></ul>
                `;
                gridContainer.appendChild(cell);
            }
        }

        // 통합 모달 트리거 (요구사항 1, 3, 4 공통 바인딩 처리)
        function triggerModalByCode(code, name) {
            // matrix_data.json의 16칸 내부를 전수조사하여 해당 코드가 가진 스냅샷 매칭
            let foundStock = null;
            for (const cell in globalCapturedData) {
                const target = globalCapturedData[cell].find(s => s.code === code);
                if (target) { foundStock = target; break; }
            }

            if (foundStock) {
                openModal(foundStock);
            } else {
                // 오늘 매트릭스에는 없지만 누적 랭킹/이평선에 존재하는 경우 가변 예외 처리
                openModal({
                    code: code, name: name, change: "당일 미포착", volume: "당일 미포착",
                    first_date: "장부 확인 필요", first_cell: "장부 확인 필요"
                });
            }
        }

        function openModal(stock) {
            document.getElementById('mName').innerText = stock.name;
            document.getElementById('mCode').innerText = stock.code;
            document.getElementById('mChange').innerText = isNaN(stock.change) ? stock.change : `+${stock.change}%`;
            document.getElementById('mVolume').innerText = isNaN(stock.volume) ? stock.volume : `${stock.volume}%`;
            document.getElementById('mFirstDate').innerText = stock.first_date;
            document.getElementById('mFirstCell').innerText = stock.first_cell;
            document.getElementById('stockModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('stockModal').style.display = 'none';
        }

        // 백엔드 데이터 파싱 및 뷰어 매핑
        async function fetchMatrixData() {
            try {
                const response = await fetch('matrix_data.json');
                const data = await response.json();
                globalCapturedData = data.captured;

                // 1. 4x4 매트릭스 카드 맵
                for (let r = 1; r <= 4; r++) {
                    for (let c = 1; c <= 4; c++) {
                        const cellId = `R${r}C${c}`;
                        const listContainer = document.getElementById(`list-${cellId}`);
                        listContainer.innerHTML = '';

                        const stocks = data.captured[cellId] || [];
                        stocks.forEach(stock => {
                            const li = document.createElement('li');
                            li.className = 'stock-item';
                            li.onclick = () => openModal(stock);
                            li.innerHTML = `
                                <span>${stock.name}</span>
                                <span class="stock-change" style="color: var(--r${r});">+${stock.change}%</span>
                            `;
                            listContainer.appendChild(li);
                        });
                    }
                }

                // 2. [요구사항 3] 이평선 돌파 종목 클릭 시 모달 연동
                const maContainer = document.getElementById('maList');
                maContainer.innerHTML = '';
                (data.ma_breakthroughs || []).forEach(stock => {
                    const li = document.createElement('li');
                    li.className = 'stock-item ma-item';
                    li.onclick = () => triggerModalByCode(stock.code, stock.name);
                    
                    let badges = '';
                    if (stock.ma5) badges += '<span class="badge bg-ma5">5일</span> ';
                    if (stock.ma20) badges += '<span class="badge bg-ma20">20일</span> ';
                    if (stock.ma60) badges += '<span class="badge bg-ma60">60일</span> ';
                    
                    li.innerHTML = `
                        <div>
                            <strong>${stock.name}</strong>
                            <span style="font-size:0.75rem; color:var(--text-muted); display:block;">${stock.code}</span>
                        </div>
                        <div class="ma-badges">${badges}</div>
                    `;
                    maContainer.appendChild(li);
                });

                // 3. [요구사항 1] 누적 카운트 랭킹 종목 클릭 시 모달 연동
                const rankContainer = document.getElementById('rankingGrid');
                rankContainer.innerHTML = '';
                (data.rankings || []).slice(0, 40).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'ranking-card';
                    card.onclick = () => triggerModalByCode(item.code, item.name);
                    card.innerHTML = `
                        <div class="rank-info">
                            <span class="rank-name">${item.name}</span>
                            <span class="rank-code">${item.code}</span>
                        </div>
                        <span class="rank-count">${item.count}회</span>
                    `;
                    rankContainer.appendChild(card);
                });

            } catch (error) {
                console.error("대시보드 동적 로드 실패:", error);
            }
        }

        // [요구사항 4] 로컬스토리지 기반 매매일지 시스템 엔진
        function initJournal() {
            document.getElementById('journalDate').value = new Date().toISOString().substring(0, 10);
            renderJournals();
        }

        function saveJournal() {
            const date = document.getElementById('journalDate').value;
            const title = document.getElementById('journalTitle').value.trim();
            const content = document.getElementById('journalContent').value.trim();

            if (!title || !content) { alert("일지 제목과 내용을 입력하세요."); return; }

            const journals = JSON.parse(localStorage.getItem('trading_journals') || '[]');
            journals.unshift({ id: Date.now(), date, title, content });
            localStorage.setItem('trading_journals', JSON.stringify(journals));

            document.getElementById('journalTitle').value = '';
            document.getElementById('journalContent').value = '';
            renderJournals();
        }

        function deleteJournal(id) {
            if (!confirm("해당 일지를 삭제하시겠습니까?")) return;
            let journals = JSON.parse(localStorage.getItem('trading_journals') || '[]');
            journals = journals.filter(j => j.id !== id);
            localStorage.setItem('trading_journals', JSON.stringify(journals));
            renderJournals();
        }

        function renderJournals() {
            const listContainer = document.getElementById('journalList');
            listContainer.innerHTML = '';
            const journals = JSON.parse(localStorage.getItem('trading_journals') || '[]');

            if (journals.length === 0) {
                listContainer.innerHTML = '<li style="color:var(--text-muted); text-align:center; padding:20px;">기록된 매매일지가 없습니다.</li>';
                return;
            }

            journals.forEach(j => {
                const li = document.createElement('li');
                li.className = 'journal-item';
                li.innerHTML = `
                    <div class="journal-item-header">
                        <span>📅 기입일자: ${j.date}</span>
                        <button class="journal-del-btn" onclick="deleteJournal(${j.id})">삭제</button>
                    </div>
                    <div class="journal-item-title">${j.title}</div>
                    <div class="journal-item-content">${j.content}</div>
                `;
                listContainer.appendChild(li);
            });
        }

        // 마스터 부팅 시 구동 시동
        window.onload = () => {
            fetchMatrixData();
            initJournal();
        };
    </script>
</body>
</html>
