name: Daily Stock Data Update

on:
  schedule:
    # 한국 시간(KST) 매일 오후 17:00 (세계 표준시 UTC 기준 오전 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # 주말이나 낮에 내가 원할 때 수동으로도 켤 수 있게 하는 버튼입니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요한 도구 설치하기
      run: |
        pip install pandas finance-datareader pykrx

    - name: 주식 분석 프로그램 실행하기
      run: |
        python update_stock.py

    - name: 계산된 결과 데이터를 저장소에 업데이트하기
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        # 원격 저장소의 최신 변경사항(방금 수정하신 main.yml)을 먼저 가져와 합칩니다.
        git pull --rebase origin main
        git commit -m "오후 17시 주도주 매트릭스 및 트래킹 데이터 업데이트 완료" || echo "변경사항 없음"
        git push
