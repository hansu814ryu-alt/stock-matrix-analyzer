<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주도주 하이브리드 4x4 계량 매트릭스</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent: #38bdf8;
            --r4: #ef4444; --r3: #f97316; --r2: #f59e0b; --r1: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.5; }
        header { margin-bottom: 25px; text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; }
        header h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 5px; }
        header p { color: var(--text-muted); font-size: 0.9rem; }

        /* 메인 레이아웃: 매트릭스와 우측 이평선 보드 */
        .main-container { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-bottom: 25px; }

        /* 4x4 매트릭스 스타일 */
        .matrix-wrapper { display: flex; flex-direction: column; }
        .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-grow: 1; }
        .matrix-cell { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; min-height: 140px; display: flex; flex-direction: column; }
        .cell-header { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; }
        .stock-list { list-style: none; overflow-y: auto; max-height: 120px; }
        .stock-item { font-size: 0.85rem; padding: 4px 6px; margin-bottom: 4px; background: rgba(255,255,255,0.03); border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s; }
        .stock-item:hover { background: var(--border-color); color: var(--accent); transform: translateX(2px); }
        .stock-change { font-weight: bold; }

        /* 행/열 인덱서 라벨용 장식 */
        .grid-labels { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 5px; text-align: center; font-size: 0.8rem; color: var(--text-muted); font-weight: bold; }

        /* 이평선 돌파 종목 섹션 */
        .ma-board { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        .ma-board h2 { font-size: 1.1rem; margin-bottom: 15px; color: #f43f5e; border-bottom: 2px solid #f43f5e; padding-bottom: 5px; }
        .ma-list { list-style: none; overflow-y: auto; max-height: 550px; }
        .ma-item { padding: 8px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
        .ma-badges { display: flex; gap: 4px; margin-top: 4px; }
        .badge { font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; font-weight: bold; color: #fff; }
        .bg-ma5 { background-color: #3b82f6; }
        .bg-ma20 { background-color: #eab308; }
        .bg-ma60 { background-color: #a855f7; }

        /* 하단 카운트 랭킹 시스템 */
        .ranking-section { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .ranking-section h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--accent); }
        .ranking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .ranking-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .rank-info { display: flex; flex-direction: column; }
        .rank-name { font-size: 0.85rem; font-weight: bold; }
        .rank-code { font-size: 0.75rem; color: var(--text-muted); }
        .rank-count { background: var(--border-color); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        /* 팝업 모달창 스펙 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 12px; padding: 25px; width: 350px; text-align: center; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; }
        .modal-title { font-size: 1.3rem; margin-bottom: 15px; color: var(--accent); }
        .modal-info-box { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 12px; text-align: left; margin-bottom: 10px; font-size: 0.9rem; }
        .modal-info-box span { color: var(--text-muted); }
        .modal-info-box strong { float: right; color: #fff; }

        /* 행별 테두리 색상 강조 */
        .r4-cell { border-top: 3px solid var(--r4); }
        .r3-cell { border-top: 3px solid var(--r3); }
        .r2-cell { border-top: 3px solid var(--r2); }
        .r1-cell { border-top: 3px solid var(--r1); }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>주도주 트래킹 하이브리드 대시보드</h1>
        <p>전수조사 기반 · 전일 대비 직관 필터 · 이평선 돌파 및 누적 빈도 분석</p>
    </header>

    <div class="main-container">
        <div class="matrix-wrapper">
            <div class="grid-labels">
                <div>C1 (거래 감소)</div>
                <div>C2 (100%~150%)</div>
                <div>C3 (150%~200%)</div>
                <div>C4 (200% 이상)</div>
            </div>
            <div class="matrix-grid" id="matrixGrid">
                </div>
        </div>

        <div class="ma-board">
            <h2>중요 이평선 돌파 (오늘)</h2>
            <ul class="ma-list" id="maList">
                <li class="ma-item" style="color: var(--text-muted); text-align: center;">데이터 로딩 중...</li>
            </ul>
        </div>
    </div>

    <div class="ranking-section">
        <h2>🔥 누적 포착 주도성 랭킹 (카운트 높은 순)</h2>
        <div class="ranking-grid" id="rankingGrid">
            </div>
    </div>

    <div class="modal" id="stockModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="mName">종목명</div>
            <div class="modal-info-box">
                <span>종목 코드</span> <strong id="mCode">000000</strong>
            </div>
            <div class="modal-info-box">
                <span>오늘 상승률</span> <strong id="mChange" style="color: #ef4444;">+0.0%</strong>
            </div>
            <div class="modal-info-box">
                <span>전일 대비 거래량</span> <strong id="mVolume">0.0%</strong>
            </div>
            <div class="modal-info-box" style="border: 1px dashed var(--accent); margin-top: 15px;">
                <span>🎯 최초 돌파 날짜</span> <strong id="mFirstDate">2026-00-00</strong>
            </div>
            <div class="modal-info-box">
                <span>🎯 최초 돌파 유형</span> <strong id="mFirstCell" style="color: var(--accent);">R0C0</strong>
            </div>
        </div>
    </div>

    <script>
        // 4x4 바둑판 레이아웃 기본 골격 선언 구조화
        const gridContainer = document.getElementById('matrixGrid');
        const rowNames = { 4: "R4 (12%이상)", 3: "R3 (6%~12%)", 2: "R2 (3%~6%)", 1: "R1 (3%미만)" };

        // 16개 칸 격자 레이아웃 역순(R4부터) 사전 배치
        for (let r = 4; r >= 1; r--) {
            for (let c = 1; c <= 4; c++) {
                const cellId = `R${r}C${c}`;
                const cell = document.createElement('div');
                cell.className = `matrix-cell r${r}-cell`;
                cell.id = cellId;
                cell.innerHTML = `
                    <div class="cell-header">
                        <span>${cellId}</span>
                        <span>${rowNames[r].split(' ')[1]}</span>
                    </div>
                    <ul class="stock-list" id="list-${cellId}"></ul>
                `;
                gridContainer.appendChild(cell);
            }
        }

        // 백엔드 파이썬 결과 파일(matrix_data.json) 동적 파싱 엔진
        async function fetchMatrixData() {
            try {
                // 깃허브 액션즈가 떨군 최신 json 연동 (경로에 맞게 작동)
                const response = await fetch('matrix_data.json');
                const data = await response.json();

                // 1. 4x4 매트릭스 화면 렌더링
                for (let r = 1; r <= 4; r++) {
                    for (let c = 1; c <= 4; c++) {
                        const cellId = `R${r}C${c}`;
                        const listContainer = document.getElementById(`list-${cellId}`);
                        listContainer.innerHTML = ''; // 초기화

                        const stocks = data.captured[cellId] || [];
                        stocks.forEach(stock => {
                            const li = document.createElement('li');
                            li.className = 'stock-item';
                            // 클릭 이벤트 바인딩 (요구사항 1, 2)
                            li.onclick = () => openModal(stock);
                            li.innerHTML = `
                                <span>${stock.name}</span>
                                <span class="stock-change" style="color: ${r >= 3 ? '#ef4444' : '#f59e0b'}">+${stock.change}%</span>
                            `;
                            listContainer.appendChild(li);
                        });
                    }
                }

                // 2. 이평선 돌파 종목 화면 렌더링 (요구사항 5)
                const maContainer = document.getElementById('maList');
                maContainer.innerHTML = '';
                const maStocks = data.ma_breakthroughs || [];

                if (maStocks.length === 0) {
                    maContainer.innerHTML = '<li class="ma-item" style="color: var(--text-muted); text-align: center;">오늘 이평선 돌파 종목 없음</li>';
                } else {
                    maStocks.forEach(stock => {
                        const li = document.createElement('li');
                        li.className = 'ma-item';
                        let badges = '';
                        if (stock.ma5) badges += '<span class="badge bg-ma5">5일선</span> ';
                        if (stock.ma20) badges += '<span class="badge bg-ma20">20일선</span> ';
                        if (stock.ma60) badges += '<span class="badge bg-ma60">60일선</span> ';
                        
                        li.innerHTML = `
                            <strong>${stock.name}</strong> (${stock.code})
                            <div class="ma-badges">${badges}</div>
                        `;
                        maContainer.appendChild(li);
                    });
                }

                // 3. 누적 포착 카운트 높은순 랭킹 배치 (요구사항 4)
                const rankContainer = document.getElementById('rankingGrid');
                rankContainer.innerHTML = '';
                const rankings = data.rankings || [];

                // 상위 30개만 가시성 있게 노출
                rankings.slice(0, 30).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'ranking-card';
                    card.innerHTML = `
                        <div class="rank-info">
                            <span class="rank-name">${item.name}</span>
                            <span class="rank-code">${item.code}</span>
                        </div>
                        <span class="rank-count">${item.count}회</span>
                    `;
                    rankContainer.appendChild(card);
                });

            } catch (error) {
                console.error("데이터 매핑 실패:", error);
            }
        }

        // 팝업 모달창 제어 로직 (요구사항 1, 2 역산 추적 바인딩)
        function openModal(stock) {
            document.getElementById('mName').innerText = stock.name;
            document.getElementById('mCode').innerText = stock.code;
            document.getElementById('mChange').innerText = `+${stock.change}%`;
            document.getElementById('mVolume').innerText = `${stock.volume}%`;
            document.getElementById('mFirstDate').innerText = stock.first_date;
            document.getElementById('mFirstCell').innerText = stock.first_cell;
            document.getElementById('stockModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('stockModal').style.display = 'none';
        }

        // 페이지 시동 시 작동
        window.onload = fetchMatrixData;
    </script>
</body>
</html>
